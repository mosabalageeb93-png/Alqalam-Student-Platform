<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 80px; }
        .header { background: var(--dark); color: var(--gold); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .profile-section { background: white; margin: 15px; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-circle { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--gold); margin: 0 auto 10px; overflow: hidden; }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .info-card { background: white; margin: 10px 15px; padding: 15px; border-radius: 12px; border-right: 5px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { background: #c0392b; color: white; margin: 20px 15px; padding: 15px; border-radius: 12px; text-align: center; text-decoration: none; display: block; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ddd; }
    </style>
</head>
<body onload="checkAccess()">

    <div class="header">
        <i class="fas fa-bars"></i>
        <span>منصة الطالب</span>
        <i class="fas fa-clock" id="timer"> 00:00</i>
    </div>

    <div class="profile-section">
        <div class="logo-circle"><img src="logo.jpg"></div>
        <h2 id="display-name">جاري التحميل...</h2>
        <p id="display-id" style="color: #666;"></p>
        <button onclick="editProfile()" style="background: none; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 15px; cursor: pointer;">تعديل البيانات</button>
    </div>

    <div class="info-card" onclick="alert('لا توجد رسوم متأخرة')">
        <span><i class="fas fa-wallet"></i> الرسوم الدراسية</span>
        <i class="fas fa-chevron-left"></i>
    </div>

    <div class="info-card" onclick="alert('الجدول الدراسي متاح في لوحة الإعلانات')">
        <span><i class="fas fa-calendar-alt"></i> الجدول الدراسي</span>
        <i class="fas fa-chevron-left"></i>
    </div>

    <a href="#" onclick="logout()" class="logout-btn">تسجيل الخروج</a>

    <script>
        function checkAccess() {
            // منع الدخول بدون تسجيل
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'index.html';
                return;
            }

            // جلب اسم المستخدم المحفوظ أو طلب اسم جديد
            let name = localStorage.getItem('user_real_name');
            let id = localStorage.getItem('app_user') || '12345678';

            if (!name) {
                name = prompt("مرحباً بك! يرجى إدخال اسمك الكامل:");
                if(!name) name = "طالب مستجد";
                localStorage.setItem('user_real_name', name);
            }
            
            document.getElementById('display-name').innerText = name;
            document.getElementById('display-id').innerText = "الرقم الجامعي: " + id;
            startTimer();
        }

        function editProfile() {
            let newName = prompt("أدخل الاسم الجديد:", localStorage.getItem('user_real_name'));
            let newPass = prompt("أدخل كلمة المرور الجديدة:");
            
            if (newName) localStorage.setItem('user_real_name', newName);
            if (newPass) localStorage.setItem('app_pass', newPass);
            
            alert("تم تحديث البيانات بنجاح!");
            location.reload();
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'index.html';
        }

        function startTimer() {
            let sec = 0;
            setInterval(() => {
                sec++;
                let m = Math.floor(sec/60);
                let s = sec%60;
                document.getElementById('timer').innerText = ` ${m}:${s < 10 ? '0'+s : s}`;
            }, 1000);
        }
    </script>
</body>
</html>
