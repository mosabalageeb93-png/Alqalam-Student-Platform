<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم المطورة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; --red: #c0392b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding-bottom: 100px; }
        
        .header { background: var(--dark); color: var(--gold); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--gold); }

        .profile-section { background: white; margin: 15px; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .logo-circle { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--gold); margin: 0 auto 10px; overflow: hidden; }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; }

        /* أيقونات بشكل 3D وظل وحواف */
        .icon-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .icon-item { 
            background: white; 
            padding: 20px; 
            border-radius: 18px; 
            text-align: center; 
            box-shadow: 0 8px 0px #ddd, 0 15px 20px rgba(0,0,0,0.1); /* تأثير الـ 3D */
            border: 1px solid #eee;
            transition: 0.2s;
            cursor: pointer;
        }
        .icon-item:active { 
            transform: translateY(4px); 
            box-shadow: 0 4px 0px #ddd, 0 8px 10px rgba(0,0,0,0.1); 
        }
        .icon-item i { font-size: 2rem; color: var(--dark); margin-bottom: 10px; display: block; }
        .icon-item span { font-weight: bold; color: #333; font-size: 0.9rem; }

        /* زر خروج مع سهم منحني */
        .logout-container { padding: 20px 15px; }
        .logout-btn { 
            background: var(--red); 
            color: white; 
            padding: 16px; 
            border-radius: 15px; 
            text-align: center; 
            font-weight: bold; 
            font-size: 1.1rem;
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            box-shadow: 0 6px 0px #8e2a1e, 0 10px 15px rgba(192, 57, 43, 0.3);
            transition: 0.2s;
        }
        .logout-btn:active { transform: translateY(3px); box-shadow: 0 3px 0px #8e2a1e; }
        .rotate-arrow { font-size: 1.3rem; transform: rotate(-45deg); }

        /* Modal Settings */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 15% auto; padding: 20px; width: 85%; border-radius: 20px; text-align: center; }
    </style>
</head>
<body onload="checkAccess()">

    <div class="header">
        <i class="fas fa-ellipsis-v" onclick="alert('القائمة')"></i>
        <span style="font-weight: bold;">لوحة التحكم</span>
        <i class="fas fa-clock" id="timer"> 00:00</i>
    </div>

    <div class="profile-section">
        <div class="logo-circle"><img src="logo.jpg"></div>
        <h2 id="display-name" style="margin: 5px 0;">مصعب العاقب</h2>
        <p id="display-id" style="color: var(--gold); margin: 0; font-weight: bold;"></p>
    </div>

    <div class="icon-grid">
        <div class="icon-item" onclick="showModal('modalAbout')">
            <i class="fas fa-university" style="color: var(--gold);"></i>
            <span>نبذة عن الكلية</span>
        </div>
        <div class="icon-item" onclick="showModal('modalSchedule')">
            <i class="fas fa-calendar-alt" style="color: #2980b9;"></i>
            <span>الجدول الدراسي</span>
        </div>
        <div class="icon-item" onclick="showModal('modalResults')">
            <i class="fas fa-poll" style="color: #27ae60;"></i>
            <span>النتائج</span>
        </div>
        <div class="icon-item" onclick="showModal('modalProfile')">
            <i class="fas fa-user-edit" style="color: #e67e22;"></i>
            <span>تعديل الملف</span>
        </div>
    </div>

    <div class="logout-container">
        <a href="#" onclick="logout()" class="logout-btn">
             تسجيل الخروج <i class="fas fa-redo-alt rotate-arrow"></i> 
        </a>
    </div>

    <script>
        function checkAccess() {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('display-name').innerText = localStorage.getItem('user_real_name') || "طالب كلية القلم";
            document.getElementById('display-id').innerText = "الرقم: " + (localStorage.getItem('app_user') || "12345678");
            startTimer();
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'index.html';
        }

        function startTimer() {
            let sec = 0;
            setInterval(() => {
                sec++;
                let m = Math.floor(sec/60);
                let s = sec%60;
                document.getElementById('timer').innerText = ` ${m}:${s < 10 ? '0'+s : s}`;
            }, 1000);
        }
    </script>
</body>
</html>
