<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - كلية القلم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --gold: #d4af37; 
            --dark: #1a1a1a; 
            --red: #c0392b; 
            --bg: #f4f7f6;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 100px; }
        
        /* الهيدر */
        .header { background: var(--dark); color: var(--gold); padding: 18px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-bottom: 3px solid var(--gold); }

        /* الملف الشخصي */
        .profile-card { background: white; margin: 20px 15px; padding: 25px; border-radius: 25px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.08); position: relative; }
        .logo-box { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--gold); margin: -60px auto 10px; background: white; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        /* شبكة الأيقونات بتصميم 3D حقيقي */
        .icon-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 15px; }
        
        .icon-item { 
            background: #ffffff; 
            padding: 25px 10px; 
            border-radius: 20px; 
            text-align: center; 
            position: relative;
            /* تأثير الـ 3D القوي */
            border: 1px solid #e0e0e0;
            box-shadow: 0 10px 0px #d1d1d1, 0 15px 25px rgba(0,0,0,0.1); 
            transition: all 0.1s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* تأثير الضغطة للأيقونات */
        .icon-item:active { 
            transform: translateY(6px); 
            box-shadow: 0 4px 0px #d1d1d1, 0 8px 15px rgba(0,0,0,0.1); 
        }

        .icon-item i { font-size: 2.2rem; margin-bottom: 12px; }
        .icon-item span { font-weight: 800; color: #333; font-size: 0.95rem; }

        /* ألوان أيقونات مخصصة */
        .color-1 { color: var(--gold); }
        .color-2 { color: #2980b9; }
        .color-3 { color: #27ae60; }
        .color-4 { color: #e67e22; }

        /* زر الخروج بتصميم عصري */
        .footer-actions { padding: 30px 15px; }
        .logout-btn { 
            background: var(--red); 
            color: white; 
            padding: 18px; 
            border-radius: 18px; 
            text-align: center; 
            font-weight: bold; 
            font-size: 1.2rem;
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px;
            /* تأثير الـ 3D للزر */
            border: none;
            box-shadow: 0 8px 0px #8e2a1e, 0 12px 20px rgba(192, 57, 43, 0.4);
            transition: 0.1s;
        }
        
        .logout-btn:active { 
            transform: translateY(5px); 
            box-shadow: 0 3px 0px #8e2a1e; 
        }

        .logout-btn i { font-size: 1.4rem; transition: 0.5s; }
        .logout-btn:hover i { transform: rotate(-180deg); } /* السهم يلف عند اللمس */

    </style>
</head>
<body onload="checkAccess()">

    <div class="header">
        <i class="fas fa-bars" onclick="alert('القائمة قيد التطوير')"></i>
        <span style="letter-spacing: 1px;">لوحة الطالب الذكية</span>
        <i class="fas fa-bell"></i>
    </div>

    <div class="profile-card">
        <div class="logo-box"><img src="logo.jpg"></div>
        <h2 id="display-name" style="margin: 10px 0 5px 0; color: var(--dark);">...</h2>
        <p id="display-id" style="color: var(--gold); font-weight: bold; margin: 0;"></p>
    </div>

    <div class="icon-grid">
        <div class="icon-item" onclick="alert('قسم النبذة')">
            <i class="fas fa-university color-1"></i>
            <span>نبذة الكلية</span>
        </div>
        <div class="icon-item" onclick="alert('قسم الجدول')">
            <i class="fas fa-calendar-alt color-2"></i>
            <span>الجدول الدراسي</span>
        </div>
        <div class="icon-item" onclick="alert('قسم النتائج')">
            <i class="fas fa-poll-h color-3"></i>
            <span>نتائج الامتحانات</span>
        </div>
        <div class="icon-item" onclick="alert('إعدادات الملف')">
            <i class="fas fa-user-cog color-4"></i>
            <span>الملف الشخصي</span>
        </div>
    </div>

    <div class="footer-actions">
        <a href="#" onclick="logout()" class="logout-btn">
             تسجيل الخروج <i class="fas fa-arrow-rotate-left"></i> 
        </a>
    </div>

    <script>
        function checkAccess() {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'index.html';
                return;
            }
            // جلب بيانات المستخدم من الذاكرة
            const name = localStorage.getItem('user_real_name') || "مصعب العاقب";
            const id = localStorage.getItem('app_user') || "31001418-25";
            
            document.getElementById('display-name').innerText = name;
            document.getElementById('display-id').innerText = "الرقم الجامعي: " + id;
        }

        function logout() {
            if(confirm("هل تريد حقاً الخروج من المنصة؟")) {
                localStorage.removeItem('isLoggedIn');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
