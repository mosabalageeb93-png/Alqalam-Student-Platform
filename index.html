<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - كلية القلم</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Tajawal:wght@400;700&display=swap');

        :root {
            --gold: #d4af37;
            --main-bg: linear-gradient(135deg, #e0f2f1 0%, #ffffff 100%); /* لون فرايحي */
            --shadow-3d: 0 8px 0px #c0c0c0, 0 15px 20px rgba(0,0,0,0.1);
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background: var(--main-bg); 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        /* الوقت والتاريخ في الأعلى */
        .date-time {
            position: absolute;
            top: 20px;
            text-align: center;
            color: #555;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* الآية القرآنية بخط الرقعة خارج المربع */
        .quran-verse { 
            font-family: 'Aref Ruqaa', serif;
            color: var(--gold); 
            font-size: 1.8rem; 
            margin-bottom: 20px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .login-card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 30px; 
            width: 85%; 
            max-width: 380px; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            position: relative;
        }
        
        .logo { 
            width: 110px; height: 110px; 
            border-radius: 50%; 
            border: 4px solid var(--gold); 
            margin: -95px auto 20px; 
            background: white; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .logo img { width: 85%; }

        .input-group { margin-bottom: 25px; text-align: right; }
        
        /* تصميم 3D للخانات */
        input { 
            width: 100%; padding: 15px; 
            border-radius: 15px; 
            border: 1px solid #eee; 
            box-sizing: border-box; 
            font-size: 1rem;
            background: #f9f9f9;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05), 0 5px 0px #e0e0e0;
            transition: 0.2s;
        }
        input:focus { transform: translateY(2px); box-shadow: 0 2px 0px #e0e0e0; outline: none; }

        /* زر دخول 3D عصري */
        .login-btn { 
            width: 100%; padding: 18px; 
            background: #2c3e50; 
            color: var(--gold); 
            border: none; 
            border-radius: 15px; 
            font-weight: bold; 
            font-size: 1.3rem; 
            cursor: pointer; 
            box-shadow: 0 8px 0px #1a252f, 0 15px 20px rgba(0,0,0,0.2);
            transition: 0.1s;
        }
        .login-btn:active { transform: translateY(5px); box-shadow: 0 3px 0px #1a252f; }

        /* التوقيع السفلي */
        .falcon-brand {
            margin-top: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #7f8c8d;
            font-size: 0.85rem;
            letter-spacing: 1px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="date-time" id="clock"></div>

    <div class="quran-verse">وَقُل رَّبِّ زِدْنِي عِلْمًا</div>

    <div class="login-card">
        <div class="logo"><img src="logo.jpg"></div>
        <h3 style="color: #333; margin-bottom: 30px;">منصة طالب كلية القلم</h3>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="اسم المستخدم (12345678)">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="كلمة المرور (00000000)">
        </div>
        
        <button class="login-btn" onclick="login()">دخول للمنصة</button>
    </div>

    <div class="falcon-brand">نموذج Falcon التجريبي</div>

    <script>
        // تحديث الوقت والتاريخ
        function updateClock() {
            const now = new Date();
            const days = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            const dateStr = days[now.getDay()] + ' ' + now.toLocaleDateString('ar-EG');
            const timeStr = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('clock').innerHTML = dateStr + ' | ' + timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            // بيانات افتراضية للتجربة
            if (user === '12345678' && pass === '00000000') {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'dashboard.html';
            } else {
                alert('عذراً، بيانات الدخول غير صحيحة');
            }
        }
    </script>
</body>
</html>
