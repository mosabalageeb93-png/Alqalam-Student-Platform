<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة كلية القلم - تسجيل الدخول</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Tajawal:wght@400;700&display=swap');
        :root { --gold: #d4af37; --dark: #2c3e50; }
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #b2dfdb 0%, #e0f2f1 100%); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .quran-verse { font-family: 'Aref Ruqaa', serif; color: var(--gold); font-size: 1.8rem; margin: 30px 0; text-align: center; }
        .login-card { background: white; padding: 40px 30px; border-radius: 30px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative; margin-top: 50px; }
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 5px solid var(--gold); margin: -100px auto 20px; background: white; overflow: hidden; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 15px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        .login-btn { width: 100%; padding: 15px; background: var(--dark); color: var(--gold); border: none; border-radius: 15px; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .brand { margin-top: 30px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

    <div class="quran-verse">وَقُل رَّبِّ زِدْنِي عِلْمًا</div>

    <div class="login-card">
        <div class="logo"><img src="logo.jpg" alt="Logo"></div>
        <h3 style="margin-bottom: 25px;">منصة طالب كلية القلم</h3>
        <input type="text" id="username" placeholder="اسم المستخدم (12345678)">
        <input type="password" id="password" placeholder="كلمة المرور (00000000)">
        <button class="login-btn" onclick="login()">دخول للمنصة</button>
    </div>

    <div class="brand">نموذج Falcon التجريبي</div>

    <script>
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === '12345678' && pass === '00000000') {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('user_real_name', 'مصعب العاقب');
                window.location.href = 'dashboard.html';
            } else {
                alert("بيانات الدخول غير صحيحة");
            }
        }
        
        // مسح أي كاش قديم عند التحميل لضمان نظافة الصفحة
        window.onload = function() {
            console.log("Falcon System Ready");
        };
    </script>
</body>
</html>
