<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - كلية القلم</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; }
        .logo { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #d4af37; margin: -70px auto 20px; background: #000; overflow: hidden; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .input-group { text-align: right; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 14px; background: #1a1a1a; color: #d4af37; border: 1px solid #d4af37; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .error { color: red; font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><img src="logo.jpg"></div>
        <h3>منصة طالب كلية القلم</h3>
        <div class="input-group">
            <label>اسم المستخدم</label>
            <input type="text" id="username" placeholder="12345678">
        </div>
        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="00000000">
        </div>
        <button class="login-btn" onclick="login()">دخول للمنصة</button>
        <p id="error-msg" class="error">بيانات الدخول غير صحيحة!</p>
    </div>

    <script>
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // التحقق من البيانات الافتراضية أو البيانات التي غيرها المستخدم
            const savedUser = localStorage.getItem('app_user') || '12345678';
            const savedPass = localStorage.getItem('app_pass') || '00000000';

            if (user === savedUser && pass === savedPass) {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
