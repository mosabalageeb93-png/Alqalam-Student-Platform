<script>
    let currentLang = 'ar';

    function toggleLanguage() {
        const html = document.getElementById('mainHtml');
        const btn = document.getElementById('langBtn');
        
        if (currentLang === 'ar') {
            currentLang = 'en';
            html.dir = 'ltr';
            html.lang = 'en';
            btn.innerText = 'AR';
            btn.className = 'btn-en';
            updateTexts('en');
        } else {
            currentLang = 'ar';
            html.dir = 'rtl';
            html.lang = 'ar';
            btn.innerText = 'EN';
            btn.className = 'btn-ar';
            updateTexts('ar');
        }
        updateClock();
    }

    function updateTexts(lang) {
        const texts = {
            ar: {
                verse: "وَقُل رَّبِّ زِدْنِي عِلْمًا",
                title: "منصة طالب كلية القلم",
                user: "اسم المستخدم 12345678",
                pass: "كلمة المرور 00000000",
                login: "دخول للمنصة",
                brand: "نموذج Falcon التجريبي",
                wrong: "بيانات الدخول غير صحيحة"
            },
            en: {
                verse: "And say: My Lord, increase me in knowledge",
                title: "Al-Qalam Student Platform",
                user: "Username 12345678",
                pass: "Password 00000000",
                login: "Login to Platform",
                brand: "Falcon Demo Version",
                wrong: "Invalid login credentials"
            }
        };
        
        document.getElementById('verse').innerText = texts[lang].verse;
        document.getElementById('title').innerText = texts[lang].title;
        document.getElementById('username').placeholder = texts[lang].user;
        document.getElementById('password').placeholder = texts[lang].pass;
        document.getElementById('loginBtn').innerText = texts[lang].login;
        document.getElementById('brand').innerText = texts[lang].brand;
        window.wrongMsg = texts[lang].wrong; // حفظ رسالة الخطأ حسب اللغة
    }

    function updateClock() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' };
        const langCode = currentLang === 'ar' ? 'ar-EG' : 'en-US';
        document.getElementById('clock').innerHTML = now.toLocaleDateString(langCode, options);
    }
    
    setInterval(updateClock, 60000);
    updateClock();

    // دالة الدخول المصلحة
    function login() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // التحقق من البيانات (تأكد أنك تدخل هذه الأرقام بالضبط)
        if (user === '12345678' && pass === '00000000') {
            // الخطوة السحرية: حفظ حالة الدخول
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('user_real_name', 'مصعب العاقب');
            
            // الانتقال للوحة التحكم
            window.location.href = 'dashboard.html';
        } else {
            alert(window.wrongMsg || "بيانات الدخول غير صحيحة");
        }
    }
</script>
