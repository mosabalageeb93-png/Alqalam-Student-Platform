<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الصقور التعليمية | Falcon Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* رجعت ليك التنسيق القديم والألوان اللي كنت مستخدمها */
        :root { --gold: #d4af37; --dark: #1a1a1a; }
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .logo-img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--gold); object-fit: cover; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--dark); color: var(--gold); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .footer-info { margin-top: 20px; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo.jpg" class="logo-img" alt="Logo">
    <h3 style="color: var(--dark);">منصة طالب كلية القلم</h3>
    <input type="text" id="username" placeholder="الرقم الجامعي">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button id="ui-login" onclick="login()">دخول المنصة</button>
    <div class="footer-info">FALCON SYSTEM v2.0</div>
</div>

<script>
    async function login() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('ui-login');

        if (!user || !pass) {
            alert("الرجاء إدخال البيانات");
            return;
        }

        btn.innerText = "...جاري التحقق";

        try {
            // هنستخدم رابط السيرفر اللي هنشغله سوا من الصفر
            const response = await fetch('https://falcon-backend-delta.vercel.app/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ seatNumber: user, password: pass })
            });

            const result = await response.json();

            if (response.ok) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('user_real_name', result.student.name);
                window.location.href = 'dashboard.html';
            } else {
                alert(result.message || "خطأ في الدخول");
                btn.innerText = "دخول المنصة";
            }
        } catch (error) {
            alert("فشل الاتصال بالسيرفر، جاري العمل على الإصلاح");
            btn.innerText = "دخول المنصة";
        }
    }
</script>

</body>
</html>
