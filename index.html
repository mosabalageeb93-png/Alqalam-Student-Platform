<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الصقور التعليمية | Falcon Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 3rem; color: var(--primary); margin-bottom: 1rem; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { width: 95%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        button:hover { background: var(--accent); }
        .lang-switch { margin-top: 15px; cursor: pointer; color: var(--accent); text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo"><i class="fas fa-paper-plane"></i></div>
    <h2 id="title">دخول المنصة</h2>
    <input type="text" id="username" placeholder="رقم الجلوس">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button id="ui-login" onclick="login()">دخول المنصة</button>
    <div class="lang-switch" onclick="toggleLang()" id="langBtn">English</div>
</div>

<script>
    let currentLang = 'ar';
    const API_URL = "https://falcon-backend-delta.vercel.app";

    function toggleLang() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.getElementById('title').innerText = currentLang === 'ar' ? 'دخول المنصة' : 'Platform Login';
        document.getElementById('username').placeholder = currentLang === 'ar' ? 'رقم الجلوس' : 'Seat Number';
        document.getElementById('password').placeholder = currentLang === 'ar' ? 'كلمة المرور' : 'Password';
        document.getElementById('ui-login').innerText = currentLang === 'ar' ? 'دخول المنصة' : 'Access Platform';
        document.getElementById('langBtn').innerText = currentLang === 'ar' ? 'English' : 'عربي';
        document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    }

    async function login() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('ui-login');

        if (!user || !pass) {
            alert(currentLang === 'ar' ? "الرجاء إدخال البيانات" : "Please enter credentials");
            return;
        }

        const originalText = btn.innerText;
        btn.innerText = currentLang === 'ar' ? "...جاري التحقق" : "Verifying...";
        btn.disabled = true;

        try {
            const response = await fetch(`${API_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ seatNumber: user, password: pass })
            });

            const result = await response.json();

            if (response.ok) {
                // تخزين البيانات للانتقال للوحة التحكم
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('user_real_name', result.student.name);
                localStorage.setItem('display-id', result.student.seatNumber);
                window.location.href = 'dashboard.html';
            } else {
                alert(result.message || (currentLang === 'ar' ? "بيانات الدخول غير صحيحة" : "Login Failed"));
            }
        } catch (error) {
            console.error(error);
            alert(currentLang === 'ar' ? "فشل الاتصال بالسيرفر! تأكد من الإنترنت" : "Connection Failed!");
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
